name: Build Standalone Binaries

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install paramiko pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --clean snapdir.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: snapdir-standalone-${{ matrix.os }}
        path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/snapdir-standalone-ubuntu-latest/snapdir
            dist/snapdir-standalone-macos-latest/snapdir
            dist/snapdir-standalone-windows-latest/snapdir.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
