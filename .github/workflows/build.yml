name: Build Standalone Binaries

on:
  push:
    branches: [ "main" ] # Runs every time you push to the main branch
  workflow_dispatch:      # Allows you to run it manually from the UI

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # This defines the three environments
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install paramiko pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --clean snapdir.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backup-binaries-${{ matrix.os }}
        path: dist/
